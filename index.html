<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attach Part Console</title>

    <!-- ChicagoFLF — Classic Mac OS system font (Robin Casady, public domain) -->
    <!-- Font loaded via @font-face in style.css -->

    <!-- React 18 from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel standalone for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <!-- Load in order: protocol, utilities, transport, connection, registry, API -->

    <!-- Protocol constants (must load first) -->
    <script src="protocol.js"></script>

    <!-- MIDI abstraction layer -->
    <script src="midi-port-manager.js"></script>

    <!-- Candide transport + API -->
    <script src="transport.js"></script>
    <script src="chunked-transport.js"></script>
    <script src="midi-connection.js"></script>
    <script src="mock-devices.js"></script>
    <script src="midi-state.js"></script>
    <script src="device-registry.js"></script>
    <script src="api.js"></script>

    <!-- Bartleby transport + hooks (API merged into unified api.js) -->
    <script src="bartleby-transport.js"></script>
    <script src="bartleby-chunked-transport.js"></script>
    <script type="text/babel" src="bartleby-hooks.js"></script>

    <!-- New UI layer -->
    <script src="workspace-persistence.js"></script>
    <script src="window-manager.js"></script>
    <script type="text/babel" src="menu-bar.js"></script>
    <script type="text/babel" src="desktop.js"></script>
    <script type="text/babel" src="device-app-window.js"></script>
    <script type="text/babel" src="bartleby-config-window.js"></script>
    <script type="text/babel" src="patch-editor.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
