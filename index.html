<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attach Part Console</title>

    <!-- React 18 from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel standalone for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Styling: system.css foundation → bridge → app-specific -->
    <link rel="stylesheet" href="vendor/system.css/style.css">
    <link rel="stylesheet" href="apc-bridge.css">
    <link rel="stylesheet" href="apc-app.css">
</head>
<body>
    <div id="root"></div>

    <!-- Load in order: protocol, utilities, transport, connection, registry, API -->

    <!-- Protocol constants (must load first) -->
    <script src="protocol.js"></script>
    <script src="protocol-dm.js"></script>

    <!-- MIDI abstraction layer -->
    <script src="midi-port-manager.js"></script>

    <!-- Candide transport + API -->
    <script src="transport.js"></script>
    <script src="chunked-transport.js"></script>
    <script src="firmware-uploader.js"></script>
    <script src="midi-connection.js"></script>
    <script src="mock-devices.js"></script>
    <script src="midi-state.js"></script>
    <script src="device-registry.js"></script>
    <script src="api.js"></script>

    <!-- Virtual devices (software MIDI devices living in APC) -->
    <script src="virtual-device.js"></script>
    <script src="estragon.js"></script>
    <script src="ahab.js"></script>

    <!-- Bartleby hooks (transport unified in transport.js + chunked-transport.js) -->
    <script type="text/babel" src="bartleby-hooks.js"></script>

    <!-- New UI layer -->
    <script src="workspace-persistence.js"></script>
    <script src="window-manager.js"></script>
    <script type="text/babel" src="ap-select.js"></script>
    <script type="text/babel" src="ap-wires.js"></script>
    <script type="text/babel" src="menu-bar.js"></script>
    <script type="text/babel" src="desktop.js"></script>
    <script type="text/babel" src="device-app-window.js"></script>
    <script type="text/babel" src="bartleby-config-window.js"></script>
    <script type="text/babel" src="ahab-window.js"></script>
    <script type="text/babel" src="style-guide.js"></script>
    <script src="topology-utils.js"></script>

    <!-- Patch editor components (extracted from patch-editor.js) -->
    <script type="text/babel" src="node-widgets.js"></script>
    <script type="text/babel" src="node-component.js"></script>
    <script type="text/babel" src="node-wires.js"></script>
    <script type="text/babel" src="node-context-menu.js"></script>
    <script type="text/babel" src="patches-list.js"></script>
    <script type="text/babel" src="module-drawer.js"></script>
    <script type="text/babel" src="confirm-dialog.js"></script>

    <script type="text/babel" src="patch-editor.js"></script>

    <!-- App component windows (extracted from app.js) -->
    <script type="text/babel" src="firmware-window.js"></script>
    <script type="text/babel" src="language-window.js"></script>
    <script type="text/babel" src="expression-pad-window.js"></script>
    <script type="text/babel" src="routing-window.js"></script>
    <script type="text/babel" src="log-window.js"></script>

    <script type="text/babel" src="app.js"></script>
</body>
</html>
