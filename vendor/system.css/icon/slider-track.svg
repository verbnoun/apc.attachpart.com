<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Track: 2px black border (1px corner notch) + 2px white padding + transparent center -->
<!-- Black border - top (notched corners) -->
<rect x="1" y="0" width="18" height="1" fill="black"/>
<rect x="0" y="1" width="20" height="1" fill="black"/>
<!-- Black border - bottom (notched corners) -->
<rect x="0" y="18" width="20" height="1" fill="black"/>
<rect x="1" y="19" width="18" height="1" fill="black"/>
<!-- Black border - left/right sides -->
<rect x="0" y="2" width="2" height="16" fill="black"/>
<rect x="18" y="2" width="2" height="16" fill="black"/>
<!-- White padding (2px gap between border and center) -->
<rect x="2" y="2" width="16" height="2" fill="white"/>
<rect x="2" y="16" width="16" height="2" fill="white"/>
<rect x="2" y="4" width="2" height="12" fill="white"/>
<rect x="16" y="4" width="2" height="12" fill="white"/>
</svg>
