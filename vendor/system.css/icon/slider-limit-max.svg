<svg width="8" height="10" viewBox="0 0 8 10" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Max limit marker: small upward-pointing triangle with stem -->
<!-- Triangle (top, points up from track) -->
<rect x="3" y="0" width="2" height="1" fill="black"/>
<rect x="2" y="1" width="4" height="1" fill="black"/>
<rect x="1" y="2" width="6" height="1" fill="black"/>
<rect x="0" y="3" width="8" height="1" fill="black"/>
<!-- Stem (bottom) -->
<rect x="3" y="4" width="2" height="3" fill="black"/>
</svg>
