<svg width="8" height="10" viewBox="0 0 8 10" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Min limit marker: small downward-pointing triangle with stem -->
<!-- Stem (top) -->
<rect x="3" y="0" width="2" height="3" fill="black"/>
<!-- Triangle (bottom, points down to track) -->
<rect x="0" y="3" width="8" height="1" fill="black"/>
<rect x="1" y="4" width="6" height="1" fill="black"/>
<rect x="2" y="5" width="4" height="1" fill="black"/>
<rect x="3" y="6" width="2" height="1" fill="black"/>
</svg>
