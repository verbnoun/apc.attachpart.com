<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attach Part Console - UI Mockup</title>

    <!-- NES.css for pixel art styling -->
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <!-- Press Start 2P font for pixel aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- WinBox.js for window management -->
    <link rel="stylesheet" href="https://unpkg.com/winbox@0.2.82/dist/css/winbox.min.css">
    <script src="https://unpkg.com/winbox@0.2.82/dist/winbox.bundle.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            background: #212529;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* Desktop workspace */
        .desktop {
            width: 100%;
            height: 100%;
            background:
                linear-gradient(90deg, rgba(50,50,60,0.3) 1px, transparent 1px),
                linear-gradient(rgba(50,50,60,0.3) 1px, transparent 1px),
                #1a1a2e;
            background-size: 32px 32px;
            position: relative;
        }

        /* Taskbar at bottom */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: #212529;
            border-top: 4px solid #fff;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 8px;
            z-index: 9999;
        }

        .taskbar-button {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 8px 12px;
        }

        .taskbar-status {
            margin-left: auto;
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 8px;
        }

        .status-led {
            width: 8px;
            height: 8px;
            background: #92cc41;
            box-shadow: 0 0 4px #92cc41;
        }

        .status-led.disconnected {
            background: #e76e55;
            box-shadow: 0 0 4px #e76e55;
        }

        /* Custom WinBox theme to match NES.css */
        .winbox {
            border: 4px solid #212529;
            box-shadow:
                inset -4px -4px #adafbc,
                inset 4px 4px #fff;
            background: #212529;
        }

        .winbox .wb-header {
            background: #209cee;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
        }

        .winbox .wb-body {
            background: #212529;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            overflow: auto;
        }

        .winbox .wb-title {
            text-transform: uppercase;
        }

        /* Module drawer */
        .module-drawer {
            padding: 16px;
        }

        .module-drawer h3 {
            font-size: 10px;
            margin-bottom: 16px;
            color: #92cc41;
        }

        .module-item {
            background: #212529;
            border: 4px solid #212529;
            box-shadow:
                inset -4px -4px #adafbc,
                inset 4px 4px #fff;
            padding: 12px;
            margin-bottom: 8px;
            cursor: grab;
            text-align: center;
            font-size: 8px;
            transition: transform 0.1s;
        }

        .module-item:hover {
            transform: scale(1.02);
            background: #2a2a3e;
        }

        .module-item:active {
            cursor: grabbing;
        }

        .module-icon {
            font-size: 16px;
            margin-bottom: 4px;
        }

        /* Patch workspace */
        .patch-workspace {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .workspace-canvas {
            width: 2000px;
            height: 2000px;
            background:
                linear-gradient(90deg, rgba(50,50,60,0.2) 1px, transparent 1px),
                linear-gradient(rgba(50,50,60,0.2) 1px, transparent 1px),
                #1a1a2e;
            background-size: 16px 16px;
            position: absolute;
            cursor: grab;
        }

        .workspace-canvas:active {
            cursor: grabbing;
        }

        /* Module nodes in workspace */
        .module-node {
            position: absolute;
            background: #212529;
            border: 4px solid #212529;
            box-shadow:
                inset -4px -4px #adafbc,
                inset 4px 4px #fff;
            padding: 8px;
            min-width: 100px;
            cursor: move;
        }

        .module-node-header {
            background: #92cc41;
            color: #212529;
            padding: 4px 8px;
            margin: -8px -8px 8px -8px;
            font-size: 8px;
            font-weight: bold;
        }

        .module-node-content {
            font-size: 8px;
        }

        .node-port {
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid #212529;
            position: absolute;
            cursor: crosshair;
        }

        .node-port.input {
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
        }

        .node-port.output {
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Connection wire */
        .connection-wire {
            position: absolute;
            pointer-events: none;
        }

        /* Device config panel */
        .device-config {
            padding: 16px;
        }

        .device-config h3 {
            font-size: 10px;
            margin-bottom: 16px;
            color: #f7d51d;
        }

        .config-section {
            margin-bottom: 16px;
        }

        .config-section label {
            display: block;
            margin-bottom: 8px;
            font-size: 8px;
            color: #adafbc;
        }

        .config-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        /* NES.css overrides for dark theme */
        .nes-container.is-dark {
            background: #212529;
        }

        .nes-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
        }

        .nes-progress {
            height: 24px;
        }

        /* Device icons in workspace */
        .device-node {
            position: absolute;
            text-align: center;
            cursor: pointer;
        }

        .device-node:hover .device-icon {
            transform: scale(1.1);
        }

        .device-icon {
            width: 64px;
            height: 64px;
            background: #212529;
            border: 4px solid #212529;
            box-shadow:
                inset -4px -4px #adafbc,
                inset 4px 4px #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.1s;
            margin-bottom: 4px;
        }

        .device-label {
            font-size: 8px;
            color: #92cc41;
        }

        .device-status {
            font-size: 6px;
            color: #adafbc;
        }
    </style>
</head>
<body>
    <div class="desktop" id="desktop">
        <!-- Devices will be placed here -->
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <button class="nes-btn is-primary taskbar-button" onclick="openModuleDrawer()">MODULES</button>
        <button class="nes-btn taskbar-button" onclick="openPatchEditor()">PATCH</button>
        <button class="nes-btn is-warning taskbar-button" onclick="openDeviceConfig('bartleby')">BARTLEBY</button>
        <button class="nes-btn is-success taskbar-button" onclick="openDeviceConfig('candide')">CANDIDE</button>

        <div class="taskbar-status">
            <span><span class="status-led"></span> BARTLEBY</span>
            <span><span class="status-led"></span> CANDIDE</span>
            <span style="color: #f7d51d;">LINKED</span>
        </div>
    </div>

    <script>
        // Track open windows
        const windows = {};

        // Module definitions
        const modules = [
            { id: 'osc', name: 'OSC', icon: '~', desc: 'Oscillator' },
            { id: 'filt', name: 'FILT', icon: '/', desc: 'Filter' },
            { id: 'amp', name: 'AMP', icon: '^', desc: 'Amplifier' },
            { id: 'env', name: 'ENV', icon: '\\', desc: 'Envelope' },
            { id: 'lfo', name: 'LFO', icon: 'S', desc: 'LFO' },
            { id: 'dly', name: 'DLY', icon: '>', desc: 'Delay' },
            { id: 'rev', name: 'REV', icon: '*', desc: 'Reverb' },
        ];

        // Open module drawer
        function openModuleDrawer() {
            if (windows.drawer) {
                windows.drawer.focus();
                return;
            }

            const html = `
                <div class="module-drawer">
                    <h3>DRAG TO ADD</h3>
                    ${modules.map(m => `
                        <div class="module-item" draggable="true" data-module="${m.id}">
                            <div class="module-icon">${m.icon}</div>
                            <div>${m.name}</div>
                        </div>
                    `).join('')}
                </div>
            `;

            windows.drawer = new WinBox({
                title: 'Modules',
                x: 16,
                y: 16,
                width: 140,
                height: 400,
                html: html,
                onclose: () => { windows.drawer = null; return false; }
            });
        }

        // Open patch editor
        function openPatchEditor() {
            if (windows.patch) {
                windows.patch.focus();
                return;
            }

            windows.patch = new WinBox({
                title: 'Patch Editor',
                x: 180,
                y: 16,
                width: 600,
                height: 450,
                html: `
                    <div class="patch-workspace" id="patch-workspace">
                        <div class="workspace-canvas" id="workspace-canvas">
                            <!-- Example nodes -->
                            <div class="module-node" style="left: 50px; top: 100px;">
                                <div class="module-node-header">OSC</div>
                                <div class="module-node-content">
                                    <div>Wave: SAW</div>
                                    <div>Tune: 0</div>
                                </div>
                                <div class="node-port output" title="Output"></div>
                            </div>

                            <div class="module-node" style="left: 220px; top: 80px;">
                                <div class="module-node-header">FILT</div>
                                <div class="module-node-content">
                                    <div>Cutoff: 80%</div>
                                    <div>Res: 20%</div>
                                </div>
                                <div class="node-port input" title="Input"></div>
                                <div class="node-port output" title="Output"></div>
                            </div>

                            <div class="module-node" style="left: 400px; top: 100px;">
                                <div class="module-node-header">AMP</div>
                                <div class="module-node-content">
                                    <div>Level: 75%</div>
                                </div>
                                <div class="node-port input" title="Input"></div>
                            </div>

                            <div class="module-node" style="left: 220px; top: 250px;">
                                <div class="module-node-header">ENV</div>
                                <div class="module-node-content">
                                    <div>A: 10ms</div>
                                    <div>D: 100ms</div>
                                    <div>S: 70%</div>
                                    <div>R: 200ms</div>
                                </div>
                                <div class="node-port output" title="Mod Out"></div>
                            </div>

                            <!-- SVG for wires -->
                            <svg width="2000" height="2000" style="position: absolute; top: 0; left: 0; pointer-events: none;">
                                <!-- OSC -> FILT -->
                                <path d="M 162 140 C 190 140, 190 120, 212 120"
                                      stroke="#92cc41" stroke-width="3" fill="none"/>
                                <text x="185" y="115" fill="#92cc41" font-size="8" font-family="Press Start 2P">100</text>

                                <!-- FILT -> AMP -->
                                <path d="M 332 120 C 360 120, 370 140, 392 140"
                                      stroke="#92cc41" stroke-width="3" fill="none"/>
                                <text x="355" y="115" fill="#92cc41" font-size="8" font-family="Press Start 2P">100</text>

                                <!-- ENV -> FILT (modulation) -->
                                <path d="M 332 290 C 380 290, 380 160, 280 160 C 230 160, 212 140, 212 140"
                                      stroke="#f7d51d" stroke-width="2" fill="none" stroke-dasharray="4"/>
                                <text x="340" y="220" fill="#f7d51d" font-size="8" font-family="Press Start 2P">64</text>
                            </svg>
                        </div>
                    </div>
                `,
                onclose: () => { windows.patch = null; return false; }
            });

            // Setup panning
            setTimeout(() => {
                const workspace = document.getElementById('patch-workspace');
                const canvas = document.getElementById('workspace-canvas');
                if (workspace && canvas) {
                    let isPanning = false;
                    let startX, startY, scrollLeft, scrollTop;

                    canvas.addEventListener('mousedown', (e) => {
                        if (e.target === canvas) {
                            isPanning = true;
                            startX = e.pageX;
                            startY = e.pageY;
                            scrollLeft = workspace.scrollLeft;
                            scrollTop = workspace.scrollTop;
                        }
                    });

                    document.addEventListener('mousemove', (e) => {
                        if (!isPanning) return;
                        const dx = e.pageX - startX;
                        const dy = e.pageY - startY;
                        workspace.scrollLeft = scrollLeft - dx;
                        workspace.scrollTop = scrollTop - dy;
                    });

                    document.addEventListener('mouseup', () => {
                        isPanning = false;
                    });
                }
            }, 100);
        }

        // Open device config
        function openDeviceConfig(device) {
            const key = `config_${device}`;
            if (windows[key]) {
                windows[key].focus();
                return;
            }

            const isBartleby = device === 'bartleby';
            const title = isBartleby ? 'Bartleby Config' : 'Candide Config';
            const color = isBartleby ? '#f7d51d' : '#92cc41';

            const bartlebyContent = `
                <div class="device-config">
                    <h3>KEYBOARD</h3>
                    <div class="config-section">
                        <label>VELOCITY CURVE</label>
                        <canvas width="120" height="60" style="background: #1a1a2e; border: 2px solid #adafbc;"></canvas>
                    </div>
                    <div class="config-section">
                        <label>PRESSURE CURVE</label>
                        <canvas width="120" height="60" style="background: #1a1a2e; border: 2px solid #adafbc;"></canvas>
                    </div>

                    <h3>POTS</h3>
                    <div class="config-section">
                        <div class="config-row">
                            <input type="checkbox" class="nes-checkbox is-dark" checked>
                            <span>POT 1: CC7</span>
                        </div>
                        <div class="config-row">
                            <input type="checkbox" class="nes-checkbox is-dark" checked>
                            <span>POT 2: CC10</span>
                        </div>
                    </div>

                    <h3>PEDAL</h3>
                    <div class="config-section">
                        <div class="config-row">
                            <input type="checkbox" class="nes-checkbox is-dark" checked>
                            <span>Pressure</span>
                        </div>
                        <div class="config-row">
                            <input type="checkbox" class="nes-checkbox is-dark">
                            <span>Pitch Bend</span>
                        </div>
                    </div>

                    <button class="nes-btn is-warning" style="width: 100%; margin-top: 16px;">UPDATE FIRMWARE</button>
                </div>
            `;

            const candideContent = `
                <div class="device-config">
                    <h3>PATCHES</h3>
                    <div class="config-section">
                        <div class="nes-container is-dark" style="padding: 8px; margin-bottom: 8px; cursor: pointer; background: #2a3a4a;">
                            > Init Patch
                        </div>
                        <div class="nes-container is-dark" style="padding: 8px; margin-bottom: 8px; cursor: pointer;">
                            Bass Lead
                        </div>
                        <div class="nes-container is-dark" style="padding: 8px; margin-bottom: 8px; cursor: pointer;">
                            Pad Thing
                        </div>
                        <button class="nes-btn is-primary" style="width: 100%;">+ NEW PATCH</button>
                    </div>

                    <h3>DEVICE</h3>
                    <div class="config-section">
                        <label>VERSION: v0.9.0</label>
                        <progress class="nes-progress is-success" value="100" max="100" style="margin: 8px 0;"></progress>
                        <label style="color: #92cc41;">SAVED</label>
                    </div>

                    <button class="nes-btn is-success" style="width: 100%; margin-top: 16px;">UPDATE FIRMWARE</button>
                </div>
            `;

            windows[key] = new WinBox({
                title: title,
                x: isBartleby ? 800 : 820,
                y: isBartleby ? 16 : 36,
                width: 280,
                height: 450,
                html: isBartleby ? bartlebyContent : candideContent,
                onclose: () => { windows[key] = null; return false; }
            });
        }

        // Create device icons on desktop
        function createDeviceIcons() {
            const desktop = document.getElementById('desktop');

            // Bartleby icon
            const bartleby = document.createElement('div');
            bartleby.className = 'device-node';
            bartleby.style.left = '32px';
            bartleby.style.bottom = '80px';
            bartleby.innerHTML = `
                <div class="device-icon" ondblclick="openDeviceConfig('bartleby')">B</div>
                <div class="device-label">BARTLEBY</div>
                <div class="device-status">Connected</div>
            `;
            desktop.appendChild(bartleby);

            // Candide icon
            const candide = document.createElement('div');
            candide.className = 'device-node';
            candide.style.left = '120px';
            candide.style.bottom = '80px';
            candide.innerHTML = `
                <div class="device-icon" ondblclick="openDeviceConfig('candide')">C</div>
                <div class="device-label">CANDIDE</div>
                <div class="device-status">Connected</div>
            `;
            desktop.appendChild(candide);
        }

        // Initialize
        createDeviceIcons();

        // Auto-open some windows for demo
        setTimeout(() => {
            openModuleDrawer();
            openPatchEditor();
        }, 500);
    </script>
</body>
</html>
